app-id: com.prochamp.LinuxToolbox
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: linux-toolbox

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=x11

modules:
  - name: linux-toolbox
    buildsystem: simple
    build-commands:
      - install -Dm755 linux_toolbox.py /app/bin/linux-toolbox
      - install -Dm644 com.prochamp.LinuxToolbox.desktop /app/share/applications/com.prochamp.LinuxToolbox.desktop
      - install -Dm644 linux-toolbox.png /app/share/icons/hicolor/512x512/apps/com.prochamp.LinuxToolbox.png

    sources:
      - type: dir
        path: ..
